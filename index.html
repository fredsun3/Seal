<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="篆书之美 - 以百家姓为引,展示李斯小篆、大篆金文、鸟虫篆三种篆体字形之美" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&family=Long+Cang&family=Liu+Jian+Mao+Cao&display=swap" rel="stylesheet" />
    <title>篆书之美 · 百家姓三篆展示</title>
    <meta name="version" content="20260625a" />
    <!-- GitHub Pages SPA 路由回退:从 404.html 重定向回来时恢复原路径 -->
    <script>
      (function () {
        var path = sessionStorage.getItem('gh-pages-redirect');
        if (path) {
          sessionStorage.removeItem('gh-pages-redirect');
          window.history.replaceState(null, '', path);
        }
      })();
    </script>
    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on('vite:error', (error) => {
          if (error.err) {
            console.error(
              [error.err.message, error.err.frame].filter(Boolean).join('\n'),
            )
          }
        })
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
